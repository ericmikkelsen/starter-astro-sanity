name: Formatting

on:
    pull_request:
        branches: [main]

permissions:
    contents: write

jobs:
    formatting:
        name: Formatting
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ github.head_ref }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Format
              run: npx prettier --write .

            - name: Commit formatted files
              uses: stefanzweifel/git-auto-commit-action@v7
              with:
                  commit_message: 'style: auto-format via prettier'
